# Config Supabase CLI — Orava
# Généré à la main (CLI absent au moment de la création). Tu peux le régénérer
# avec `supabase init` après avoir installé le CLI (voir README.md).
project_id = "orava"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

name: CI

# Garde-fou de merge : lint + types + tests sur chaque PR vers main.
# Rapide, sans secrets — le build EAS est séparé (eas-build.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Types · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm ci

      - name: Lint
        working-directory: mobile_app
        run: npm run lint

      - name: Typecheck
        working-directory: mobile_app
        run: npm run typecheck

      - name: Tests
        working-directory: mobile_app
        run: npm test -- --ci --coverage

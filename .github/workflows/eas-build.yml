name: EAS Build

# Build natif cloud — déclenchement MANUEL uniquement (Actions → EAS Build → Run).
# Volontairement pas sur push/PR : chaque build consomme des crédits EAS et
# échoue tant que les EXPO_PUBLIC_* ne sont pas injectés (cf. BACKLOG ORA-004).
# Pour réactiver l'auto-build sur main une fois `eas secret:create` fait,
# décommenter le bloc `push` ci-dessous.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  build-ios:
    name: iOS (preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm ci

      - name: Lint
        working-directory: mobile_app
        run: npm run lint

      - name: EAS Build iOS
        working-directory: mobile_app
        run: npx eas-cli build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-android:
    name: Android (preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Install dependencies
        working-directory: mobile_app
        run: npm ci

      - name: Lint
        working-directory: mobile_app
        run: npm run lint

      - name: EAS Build Android
        working-directory: mobile_app
        run: npx eas-cli build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
